<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Andrea Ghirardi</title>
    <link rel="stylesheet" href="style.css">
    <script>(function(){var t=localStorage.getItem('ag-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
    <style>
        /* ── Contact page ───────────────────────────────────────── */

        .contact-wrap {
            padding: 148px 56px 0;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }

        /* Availability pill */
        .availability {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border: 1px solid rgba(0,204,255,.3);
            margin-bottom: 64px;
            width: fit-content;
            opacity: 0;
            animation: fadeSlideUp .7s ease .2s forwards;
        }

        .availability-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: .5; transform: scale(.8); }
        }

        .availability span {
            font-size: 10px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* Main headline */
        .contact-headline {
            font-family: var(--serif);
            font-size: clamp(36px, 12vw, 168px);
            font-weight: 300;
            font-style: italic;
            line-height: 1.08;
            letter-spacing: -.025em;
            margin-bottom: 80px;
            opacity: 0;
            animation: fadeSlideUp .9s cubic-bezier(.16,1,.3,1) .35s forwards;
        }

        .contact-headline .line-outline {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1.5px var(--accent);
            margin-top: -0.06em;
        }

        /* Divider */
        .contact-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 64px;
            opacity: 0;
            animation: fadeIn .6s ease .6s forwards;
        }

        /* Two-column bottom */
        .contact-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: start;
            opacity: 0;
            animation: fadeSlideUp .8s ease .75s forwards;
        }

        /* Email */
        .contact-email-label {
            font-size: 10px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .contact-email {
            display: inline-block;
            font-family: var(--serif);
            font-size: clamp(24px, 3.2vw, 44px);
            font-weight: 400;
            color: var(--fg);
            text-decoration: none;
            position: relative;
        }

        .contact-email::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0; right: 100%;
            height: 1px;
            background: var(--accent);
            transition: right .45s cubic-bezier(.16,1,.3,1);
        }

        .contact-email:hover::after { right: 0; }
        .contact-email:hover { color: var(--accent); transition: color .3s ease; }

        /* Right column */
        .contact-right { padding-top: 4px; }

        .contact-info-group {
            margin-bottom: 40px;
        }

        .contact-info-label {
            font-size: 10px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .contact-info-value {
            font-size: 15px;
            font-weight: 300;
            line-height: 1.6;
            color: rgba(var(--fg-rgb),.7);
        }

        /* Socials */
        .socials {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--fg);
            transition: color .25s ease;
            group: true;
        }

        .social-link:first-child { border-top: 1px solid var(--border); }

        .social-name {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: .06em;
        }

        .social-handle {
            font-size: 11px;
            color: var(--muted);
            transition: color .25s ease;
        }

        .social-link:hover .social-handle { color: var(--accent); }
        .social-link:hover { color: var(--accent); }

        /* Spacer */
        .contact-spacer { flex: 1; min-height: 80px; }

        /* ── Responsive ─────────────────────────────────────────── */
        @media (max-width: 900px) {
            .contact-wrap   { padding: 108px 28px 0; }
            .contact-bottom { grid-template-columns: 1fr; gap: 48px; }
        }

        @media (max-width: 540px) {
            .contact-headline { margin-bottom: 48px; }
            .availability     { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

        <ul class="nav-links">

        </div>

    </nav>

    <div class="contact-wrap">

                    <p class="contact-info-value">04754450981</p>

            </div>

        </div>

        <div class="contact-spacer"></div>

    </div>

    <footer>
        <p>© 2026 Andrea Ghirardi</p>
        <p data-i18n="footer.tagline">Progettato con cura</p>
    </footer>

    <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-nav-links">
        <a href="work.html" data-i18n="nav.work">Lavori</a>
        <a href="about.html" data-i18n="nav.about">Chi sono</a>
        <a href="contact.html" data-i18n="nav.contact">Contatti</a>
    </nav>
</div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
